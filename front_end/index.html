<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Admin Dashboard</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --terminal-bg: #1e1e1e;
            --terminal-text: #00ff00;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Navigation (Routing) */
        nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .nav-btn {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 4px;
        }
        .nav-btn:hover { background-color: #e2e8f0; }
        .nav-btn.active {
            color: var(--primary);
            background-color: #dbeafe;
        }

        /* Page Containers */
        .page { display: none; }
        .page.active { display: block; }

        /* Standard Forms & Grids */
        .add-form {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        input, button { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 16px; }
        .action-btn { background-color: var(--primary); color: white; border: none; cursor: pointer; }
        .action-btn:hover { background-color: #1d4ed8; }
        
        #inventory-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 0;
            list-style: none;
        }
        .item-card { background: var(--card-bg); border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-edit { background-color: #f59e0b; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 10px;}
        .btn-delete { background-color: #ef4444; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 10px;}

        /* --- ADDED: Inline edit form inside each card --- */
        .edit-form {
            display: none;                      /* hidden until Edit is clicked */
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e2e8f0;
            display: none;
            flex-direction: column;
            gap: 8px;
        }
        .edit-form.open { display: flex; }
        .edit-form input { font-size: 14px; padding: 7px; }
        .btn-save { background-color: #22c55e; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 10px; }
        .btn-cancel { background-color: #94a3b8; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 10px; }

        /* --- ADDED: API details badge inside card --- */
        .api-details {
            margin-top: 8px;
            padding: 8px 10px;
            background: #f0f9ff;
            border-left: 3px solid var(--primary);
            border-radius: 4px;
            font-size: 13px;
            color: #475569;
        }
        .api-details span { font-weight: 600; color: var(--primary); }

        /* Web Terminal CSS */
        .terminal-container {
            background: var(--terminal-bg);
            color: var(--terminal-text);
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            border-radius: 8px;
            height: 400px;
            display: flex;
            flex-direction: column;
        }
        #terminal-output {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }
        .terminal-input-row { display: flex; align-items: center; }
        .terminal-prompt { margin-right: 10px; }
        #cli-input {
            background: transparent;
            border: none;
            color: var(--terminal-text);
            flex-grow: 1;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Inventory Management System</h1>
    </div>

    <nav>
        <button class="nav-btn active" onclick="navigate('view-page', this)">View Inventory</button>
        <button class="nav-btn" onclick="navigate('add-page', this)">Add Item</button>
        <button class="nav-btn" onclick="navigate('cli-page', this)">Web Terminal</button>
    </nav>

    <div id="view-page" class="page active">
        <h2>Current Stock</h2>
        <ul id="inventory-list"></ul>
    </div>

    <div id="add-page" class="page">
        <h2>Add New Product</h2>
        <form id="inventory-form" class="add-form">
            <input type="text" id="name" placeholder="Product Name (Required)" required>
            <input type="number" id="price" placeholder="Price ($)" step="0.01" required>
            <input type="number" id="stock" placeholder="Stock Quantity" required>
            <input type="text" id="barcode" placeholder="Barcode (Optional API Fetch)">
            <button type="submit" class="action-btn">Add to Inventory</button>
        </form>
    </div>

    <div id="cli-page" class="page">
        <h2>Command Line Interface</h2>
        <div class="terminal-container">
            <div id="terminal-output">Welcome to Web CLI. Type 'help' for commands.</div>
            <div class="terminal-input-row">
                <span class="terminal-prompt">admin@inventory:~$</span>
                <input type="text" id="cli-input" autocomplete="off" autofocus>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:5000/inventory";

        // --- ROUTING LOGIC ---
        function navigate(pageId, buttonElement) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            buttonElement.classList.add('active');
            if (pageId === 'view-page') fetchInventory();
            if (pageId === 'cli-page') document.getElementById('cli-input').focus();
        }

        // --- CORE INVENTORY LOGIC ---
        document.addEventListener('DOMContentLoaded', fetchInventory);

        function fetchInventory() {
            fetch(API_BASE)
                .then(res => res.json())
                .then(items => {
                    const list = document.querySelector("#inventory-list");
                    list.innerHTML = "";
                    items.forEach(renderItemCard);
                }).catch(err => console.error(err));
        }

        document.querySelector("#inventory-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const payload = {
                name: document.querySelector("#name").value,
                price: parseFloat(document.querySelector("#price").value),
                stock: parseInt(document.querySelector("#stock").value),
                barcode: document.querySelector("#barcode").value || null
            };
            fetch(API_BASE, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Item added successfully!");
                document.querySelector("#inventory-form").reset();
                navigate('view-page', document.querySelectorAll('.nav-btn')[0]);
            });
        });

        function renderItemCard(item) {
            const li = document.createElement("li");
            li.className = "item-card";
            li.id = `item-${item.id}`;

            // --- ADDED: build API details block only if data exists ---
            let apiBlock = "";
            if (item.api_details) {
                const d = item.api_details;
                apiBlock = `
                    <div class="api-details">
                        <span>API:</span>
                        ${d.brand ? ` Brand: ${d.brand} |` : ""}
                        ${d.category ? ` Category: ${d.category}` : ""}
                    </div>`;
            }

            li.innerHTML = `
                <h3 style="margin: 0;">ID: ${item.id} | ${item.name}</h3>
                <p>Price: $${item.price.toFixed(2)} | Stock: ${item.stock}</p>
                ${apiBlock}
                <div class="actions">
                    <button class="btn-edit" onclick="toggleEditForm(${item.id})">Edit</button>
                    <button class="btn-delete" onclick="deleteItem(${item.id})">Delete</button>
                </div>

                <!-- ADDED: inline edit form, hidden by default -->
                <div class="edit-form" id="edit-form-${item.id}">
                    <input type="text"   id="edit-name-${item.id}"  placeholder="Name"  value="${item.name}">
                    <input type="number" id="edit-price-${item.id}" placeholder="Price" value="${item.price}" step="0.01">
                    <input type="number" id="edit-stock-${item.id}" placeholder="Stock" value="${item.stock}">
                    <div style="display:flex; gap:8px;">
                        <button class="btn-save"   onclick="saveEdit(${item.id})">Save</button>
                        <button class="btn-cancel" onclick="toggleEditForm(${item.id})">Cancel</button>
                    </div>
                </div>
            `;
            document.querySelector("#inventory-list").appendChild(li);
        }

        // --- ADDED: toggle the inline edit form open/closed ---
        function toggleEditForm(id) {
            const form = document.getElementById(`edit-form-${id}`);
            form.classList.toggle("open");
        }

        // --- ADDED: send PATCH request with updated fields ---
        function saveEdit(id) {
            const payload = {
                name:  document.getElementById(`edit-name-${id}`).value,
                price: parseFloat(document.getElementById(`edit-price-${id}`).value),
                stock: parseInt(document.getElementById(`edit-stock-${id}`).value)
            };
            fetch(`${API_BASE}/${id}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.ok) fetchInventory();        // re-render the list on success
                else alert("Update failed. Check the server.");
            })
            .catch(() => alert("Error connecting to API."));
        }

        function deleteItem(id) {
            if (!confirm("Delete item?")) return;
            fetch(`${API_BASE}/${id}`, { method: "DELETE" })
                .then(() => fetchInventory());
        }

        // --- WEB TERMINAL LOGIC ---
        const cliInput = document.getElementById('cli-input');
        const terminalOutput = document.getElementById('terminal-output');

        function printToTerminal(text) {
            terminalOutput.textContent += `\n${text}`;
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        cliInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const command = this.value.trim();
                printToTerminal(`\nadmin@inventory:~$ ${command}`);
                this.value = '';
                processCommand(command);
            }
        });

        async function processCommand(cmd) {
            const args = cmd.split(' ');
            const action = args[0].toLowerCase();

            try {
                if (action === 'help') {
                    printToTerminal(
                        "Available commands:\n" +
                        "  list                          — Show all items\n" +
                        "  add [name] [price] [stock]    — Add a new item (barcode optional as 4th arg)\n" +
                        "  update [id] [field] [value]   — Update a field (name, price, stock)\n" +
                        "  delete [id]                   — Remove an item by ID\n" +
                        "  clear                         — Clear terminal"
                    );
                }
                else if (action === 'clear') {
                    terminalOutput.textContent = "Welcome to Web CLI. Type 'help' for commands.";
                }
                else if (action === 'list') {
                    const res = await fetch(API_BASE);
                    const items = await res.json();
                    if (items.length === 0) { printToTerminal("Inventory is empty."); return; }
                    items.forEach(i => {
                        let line = `ID: ${i.id} | ${i.name} - $${i.price} (Stock: ${i.stock})`;
                        // --- ADDED: show brand from api_details if present ---
                        if (i.api_details?.brand) line += ` [${i.api_details.brand}]`;
                        printToTerminal(line);
                    });
                }

                else if (action === 'add') {
                    if (!args[1] || !args[2] || !args[3]) {
                        printToTerminal("Usage: add [name] [price] [stock] [barcode?]\nExample: add Milk 1.99 50");
                        return;
                    }
                    const payload = {
                        name: args[1],
                        price: parseFloat(args[2]),
                        stock: parseInt(args[3]),
                        barcode: args[4] || null
                    };
                    const res = await fetch(API_BASE, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    const newItem = await res.json();
                    printToTerminal(`Added: ID ${newItem.id} | ${newItem.name} - $${newItem.price} (Stock: ${newItem.stock})`);
                }
                // --- ADDED: update command ---
                else if (action === 'update') {
                    if (!args[1] || !args[2] || !args[3]) {
                        printToTerminal("Usage: update [id] [field] [value]\nExample: update 2 price 4.99\nFields: name, price, stock");
                        return;
                    }
                    const id    = args[1];
                    const field = args[2].toLowerCase();
                    const raw   = args[3];

                    if (!['name', 'price', 'stock'].includes(field)) {
                        printToTerminal(`Unknown field "${field}". Valid fields: name, price, stock`);
                        return;
                    }
                    const value = field === 'name' ? raw : field === 'price' ? parseFloat(raw) : parseInt(raw);
                    const res = await fetch(`${API_BASE}/${id}`, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ [field]: value })
                    });
                    if (res.ok) {
                        const updated = await res.json();
                        printToTerminal(`Updated ID ${id}: ${field} → ${value}`);
                    } else {
                        printToTerminal(`Error: Item ${id} not found.`);
                    }
                }
                else if (action === 'delete') {
                    if (!args[1]) {
                        printToTerminal("Error: Please provide an ID. Example: delete 1");
                        return;
                    }
                    const res = await fetch(`${API_BASE}/${args[1]}`, { method: "DELETE" });
                    if (res.ok) printToTerminal(`Item ${args[1]} deleted.`);
                    else printToTerminal(`Error: Item ${args[1]} not found.`);
                }
                else if (action !== '') {
                    printToTerminal(`Command not found: ${action}. Type 'help' for available commands.`);
                }
            } catch (err) {
                printToTerminal("Error connecting to API. Is Flask running?");
            }
        }
    </script>
</body>
</html>
